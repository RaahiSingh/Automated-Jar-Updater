<!DOCTYPE html>
<html>
<head>
  <title>JAR Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
  <h2 class="mb-4">Service Dashboard</h2>
  <div id="message"></div>
  <table class="table table-bordered table-striped" id="jarTable">
    <thead class="table-dark">
      <tr>
        <th>JAR Name</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <!-- Dynamically filled -->
    </tbody>
  </table>
</div>

<script>
  function getToken() {
    return localStorage.getItem("token");
  }

  function showMessage(msg, type = 'success') {
    const messageDiv = document.getElementById("message");
    messageDiv.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
      ${msg}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>`;
  }

  function fetchJars() {
    fetch("http://localhost:8081/api/apps", {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + getToken()
      }
    })
    .then(response => {
      if (!response.ok) throw new Error("Unauthorized");
      return response.json();
    })
    .then(data => {
      const tbody = document.querySelector("#jarTable tbody");
      tbody.innerHTML = "";

      data.forEach(jar => {
        const row = document.createElement("tr");

        // identify dashboard app (replace with your real name from DB)
        const isDashboardApp = (jar.appName === "DashboardApp");

        row.innerHTML = `
          <td>${jar.appName}</td>
          <td>${jar.appStatus}</td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="stopJar(${jar.id})">Stop</button>
            <button class="btn btn-warning btn-sm" onclick="restartJar(${jar.id})">Restart</button>
            ${isDashboardApp 
              ? "" 
              : `
                <input type="file" id="jarFile-${jar.id}" style="display:none" accept=".jar" />
                <button class="btn btn-info btn-sm" onclick="triggerFileSelect(${jar.id})">Upgrade</button>
              `
            }
          </td>
        `;
        tbody.appendChild(row);
      });
    })
    .catch(error => {
      showMessage("Error fetching services. " + error.message, "danger");
      console.error("Fetch Error:", error);
    });
  }
  function stopJar(id) {
    fetch(`http://localhost:8081/api/apps/stop/${id}`, {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + getToken()
      }
    })
    .then(response => response.text())
    .then(msg => {
      showMessage(msg, "warning"); // warning alert for stop
      fetchJars(); // refresh table after stopping
    })
    .catch(err => showMessage("Failed to stop app", "danger"));
  }

  function restartJar(id) {
    fetch(`http://localhost:8081/api/apps/restart/${id}`, {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + getToken()
      }
    })
    .then(response => response.text())
    .then(msg => {
      showMessage(msg, "success");
      fetchJars();
    })
    .catch(err => showMessage("Failed to restart app", "danger"));
  }

  function triggerFileSelect(id) {
    const fileInput = document.getElementById(`jarFile-${id}`);
    fileInput.click();
    fileInput.onchange = () => upgradeJar(id);
  }

  function upgradeJar(id) {
    const fileInput = document.getElementById(`jarFile-${id}`);
    const file = fileInput.files[0];

    if (!file) {
      showMessage("Please select a JAR file to upload.", "warning");
      return;
    }

    const formData = new FormData();
    formData.append("file", file);

    fetch(`http://localhost:8081/api/apps/upgrade/${id}`, {
      method: "PUT", // keep PUT to match backend
      headers: {
        "Authorization": "Bearer " + getToken()
        // ⚠️ do NOT set Content-Type manually, fetch sets it automatically for FormData
      },
      body: formData
    })
    .then(response => response.text())
    .then(msg => {
      showMessage(msg, "info");
      fetchJars();
    })
    .catch(err => showMessage("Failed to upgrade app", "danger"));
  }

  // Initial load
  fetchJars();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
